<body class="bg-slate-50">

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {

        const uniqueAppId = "plickers-1apic-radouani-live";

        const QUESTIONS = {

                { q: "Saut de page commence :", a: ["Une ligne", "Une nouvelle page", "Un mot", "Un titre"], c: 1 },
                { q: "Raccourci Ctrl + Z ?", a: ["Zoom", "Annuler l'action", "Zapper", "Fin"], c: 1 },
                { q: "Barre en bas affichant les mots ?", a: ["Titre", "État", "Menu", "Ruban"], c: 1 },
                { q: "Extension d'un fichier Word ?", a: [".xlsx", ".docx", ".pptx", ".txt"], c: 1 },
                { q: "Le ruban contient des :", a: ["Fichiers", "Onglets et Groupes", "Images", "Vidéos"], c: 1 },
                { q: "Corriger 'Grammaire' est en :", a: ["Rouge", "Bleu/Vert", "Jaune", "Noir"], c: 1 },
                { q: "Mettre en 'Gras' raccourci ?", a: ["Ctrl + G", "Ctrl + B", "Ctrl + S", "Ctrl + I"], c: 0 },
                { q: "Pour insérer un tableau :", a: ["Fichier", "Insertion", "Mise en page", "Outils"], c: 1 },
                { q: "Le Zoom permet de :", a: ["Imprimer", "Agrandir l'affichage", "Changer taille", "Recadrer"], c: 1 },
                { q: "Pied de page se trouve :", a: ["En haut", "En bas", "Au milieu", "À droite"], c: 1 },
                { q: "En-tête se trouve :", a: ["En haut", "En bas", "À gauche", "Partout"], c: 0 },
                { q: "Fermer Word bouton :", a: ["_", "[]", "X", "?"], c: 2 }
            ],
            excel: [
                { q: "Rôle de Microsoft Excel ?", a: ["Lettres", "Calculs et Tableaux", "Diaporamas", "Web"], c: 1 },
                { q: "Fichier Excel s'appelle :", a: ["Document", "Classeur", "Présentation", "Image"], c: 1 },
                { q: "Les colonnes sont des :", a: ["Chiffres", "Lettres (A, B...)", "Points", "Mots"], c: 1 },
                { q: "Les lignes sont des :", a: ["Chiffres (1, 2...)", "Lettres", "Signes", "Titres"], c: 0 },
                { q: "Intersection ligne/colonne ?", a: ["Carré", "Cellule", "Lien", "Bouton"], c: 1 },
                { q: "Adresse cellule Colonne C / Ligne 4 ?", a: ["4C", "C-4", "C4", "CC4"], c: 2 },
                { q: "Signe début formule ?", a: ["+", "*", "=", "/"], c: 2 },
                { q: "Symbole Multiplication ?", a: ["x", "*", "+", ":"], c: 1 },
                { q: "Symbole Division ?", a: ["/", "÷", "%", "\\"], c: 0 },
                { q: "Barre de saisie s'appelle :", a: ["Barre titre", "Barre de formule", "Barre état", "Menu"], c: 1 },
                { q: "Extension Excel ?", a: [".docx", ".xlsx", ".pdf", ".txt"], c: 1 },
                { q: "Additionner A1 et A2 :", a: ["A1+A2", "=A1+A2", "SUM(A1,A2)", "A1 plus A2"], c: 1 },
                { q: "Fonction Somme automatique ?", a: ["TOTAL", "SOMME", "CALCUL", "ADD"], c: 1 },
                { q: "Groupe de cellules s'appelle :", a: ["Famille", "Plage", "Zone", "Bloc"], c: 1 },
                { q: "Plage de A1 à A5 s'écrit :", a: ["A1-A5", "A1;A5", "A1:A5", "A1..A5"], c: 2 },
                { q: "Si '######' apparaît :", a: ["Erreur", "Colonne trop étroite", "Fini", "Caché"], c: 1 },
                { q: "Fusionner des cellules :", a: ["Les effacer", "N'en faire qu'une", "Les colorier", "Trier"], c: 1 },
                { q: "Le bouton 'Σ' fait :", a: ["Soustraction", "Somme", "Graphique", "Image"], c: 1 },
                { q: "Note la plus haute fonction ?", a: ["MIN", "MAX", "MOYENNE", "SOMME"], c: 1 },
                { q: "Note la plus basse fonction ?", a: ["MAX", "MIN", "MOYENNE", "TOTAL"], c: 1 },
                { q: "Calculer la moyenne :", a: ["=MOYENNE()", "=SOMME()", "=DIV()", "=MED()"], c: 0 },
                { q: "Trier de A à Z onglet ?", a: ["Insertion", "Données", "Affichage", "Formules"], c: 1 },
                { q: "Graphique secteurs est un :", a: ["Bâton", "Cercle (Camembert)", "Ligne", "Point"], c: 1 },
                { q: "Petit carré en bas de cellule :", a: ["Supprimer", "Poignée de recopie", "Zoom", "Aide"], c: 1 },
                { q: "Un classeur contient des :", a: ["Livres", "Feuilles de calcul", "Diapositives", "Sites"], c: 1 },
                { q: "Renommer une feuille :", a: ["Double-clic sur l'onglet", "F1", "Suppr", "Entrée"], c: 0 },
                { q: "Formule soustraction ?", a: ["=A1+B1", "=A1-B1", "A1-B1", "=A1*B1"], c: 1 },
                { q: "Alignement nombre par défaut :", a: ["Gauche", "Droite", "Centré", "Justifié"], c: 1 },
                { q: "Alignement texte par défaut :", a: ["Gauche", "Droite", "Centré", "Haut"], c: 0 },
                { q: "Icône '$' format ?", a: ["Texte", "Monétaire", "Heure", "Date"], c: 1 },
                { q: "Taper 5+5 sans '=' affiche :", a: ["10", "5+5", "Erreur", "0"], c: 1 },
                { q: "Mettre des bordures :", a: ["Dessiner", "Bouton Bordures", "Image", "Format page"], c: 1 },
                { q: "Ctrl + S ?", a: ["Supprimer", "Sauvegarder", "Sortir", "Suivant"], c: 1 },
                { q: "Figer les volets sert à :", a: ["Bloquer titre", "Supprimer", "Colorier", "Calculer"], c: 0 },
                { q: "Filtre sert à :", a: ["Colorier", "Afficher selon critère", "Calculer", "Imprimer"], c: 1 },
                { q: "Une cellule active est :", a: ["Effacée", "Sélectionnée", "Cachée", "Vide"], c: 1 },
                { q: "Le signe '*' fait :", a: ["Plus", "Fois", "Moins", "Divisé"], c: 1 },
                { q: "Le signe '/' fait :", a: ["Plus", "Divisé", "Fois", "Moins"], c: 1 },
                { q: "Changer la hauteur d'une :", a: ["Colonne", "Ligne", "Cellule", "Feuille"], c: 1 },
                { q: "Graphique en bâtons s'appelle :", a: ["Secteur", "Histogramme", "Courbe", "Radar"], c: 1 }
            ]
        };

        const STUDENTS = Array.from({ length: 30 }, (_, i) => ({ id: (i + 1).toString(), name: `Élève ${i + 1}` }));

        const LocalQR = ({ text }) => {
            const divRef = useRef(null);
            useEffect(() => {
                if (window.qrcode) {
                    const qr = qrcode(0, 'L');
                    qr.addData(text);
                    qr.make();
                    divRef.current.innerHTML = qr.createSvgTag(4, 0);
                }
            }, [text]);
            return <div ref={divRef} className="flex justify-center bg-white p-2"></div>;
        };

        const ScannerComp = ({ onScan, setView }) => {
            const [last, setLast] = useState(null);
            const scannerRef = useRef(null);

            useEffect(() => {
                const start = async () => {
                    const scanner = new Html5Qrcode("reader");
                    scannerRef.current = scanner;
                    try {
                        await scanner.start(
                            { facingMode: "environment" },
                            { fps: 20, qrbox: 250 },
                            (text) => {
                                const parts = text.split('-');
                                if (parts.length === 2) {
                                    const [sId, char] = parts;
                                    const idx = "ABCD".indexOf(char);
                                    if (idx !== -1) {
                                        onScan(sId, idx);
                                        setLast(`Élève ${sId} : ${char} ✅`);
                                        if (navigator.vibrate) navigator.vibrate(50);
                                    }
                                }
                            }
                        );
                    } catch (e) { console.error(e); }
                };
                start();
                return () => { if (scannerRef.current) scannerRef.current.stop(); };
            }, []);

            return (
                <div className="min-h-screen bg-black text-white flex flex-col">
                    <header className="p-4 flex justify-between bg-zinc-900 border-b border-white/10">
                        <button onClick={() => setView('menu')} className="font-bold text-zinc-400">← RETOUR</button>
                        <h2 className="font-black text-green-500 italic">SCANNER EN DIRECT</h2>
                        <div className="w-10"></div>
                    </header>
                    <div id="reader" className="flex-1 w-full"></div>
                    {last && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-green-500 px-8 py-4 rounded-full font-black text-xl animate-pulse shadow-2xl">{last}</div>}
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('menu');
            const [session, setSession] = useState({ currentQ: 0, showAnswers: false, module: 'excel' });
            const [responses, setResponses] = useState({});
            const [loading, setLoading] = useState(true);
            const fireDB = useRef(null);

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const app = firebase.initializeApp(firebaseConfig);
                        const db = firebase.firestore(app);
                        const auth = firebase.auth(app);
                        fireDB.current = db;

                        // CORRECTION: Connexion Anonyme obligatoire pour éviter l'erreur de configuration
                        await auth.signInAnonymously();

                        // Sync Config
                        db.doc(`artifacts/${uniqueAppId}/config/session`).onSnapshot(snap => {
                            if (snap.exists) setSession(snap.data());
                        });

                        // Sync Réponses
                        db.collection(`artifacts/${uniqueAppId}/responses`).onSnapshot(snap => {
                            const d = {};
                            snap.forEach(doc => d[doc.id] = doc.data());
                            setResponses(d);
                        });

                        setLoading(false);
                    } catch (e) {
                        console.error("Firebase Auth/Init Error:", e);
                        setLoading(false);
                    }
                };
                initFirebase();
            }, []);

            const updateCloud = (up) => {
                const ns = { ...session, ...up };
                if (fireDB.current) fireDB.current.doc(`artifacts/${uniqueAppId}/config/session`).set(ns, {merge: true});
            };

            const submitVote = (sId, aIdx) => {
                if (fireDB.current) fireDB.current.doc(`artifacts/${uniqueAppId}/responses/${sId}`).set({ answerIdx: aIdx, t: Date.now() });
            };

            const resetVotes = async () => {
                updateCloud({ showAnswers: false });
                if (fireDB.current) {
                    const snap = await fireDB.current.collection(`artifacts/${uniqueAppId}/responses`).get();
                    const batch = fireDB.current.batch();
                    snap.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                }
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black">CHARGEMENT...</div>;

            if (view === 'menu') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50">
                    <h1 className="text-5xl font-black mb-2 italic">PLICKERS<span className="text-blue-600">.</span></h1>
                    <p className="text-slate-400 font-bold mb-10 tracking-widest uppercase">Prof. A. RADOUANI</p>
                    
                    <div className="flex gap-4 mb-12 bg-white p-2 rounded-2xl shadow-sm border">
                        <button onClick={() => updateCloud({module: 'word', currentQ: 0})} className={`px-6 py-2 rounded-xl font-black ${session.module === 'word' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>WORD</button>
                        <button onClick={() => updateCloud({module: 'excel', currentQ: 0})} className={`px-6 py-2 rounded-xl font-black ${session.module === 'excel' ? 'bg-green-600 text-white' : 'text-slate-400'}`}>EXCEL</button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl">
                        <button onClick={() => setView('teacher')} className="bg-white p-10 rounded-3xl shadow-xl border-b-8 border-blue-600 hover:-translate-y-1 transition-all">
                            <span className="text-4xl block mb-2">📊</span>
                            <span className="font-black text-xl">DASHBOARD</span>
                        </button>
                        <button onClick={() => setView('scanner')} className="bg-white p-10 rounded-3xl shadow-xl border-b-8 border-green-500 hover:-translate-y-1 transition-all">
                            <span className="text-4xl block mb-2">📸</span>
                            <span className="font-black text-xl">SCANNER</span>
                        </button>
                        <button onClick={() => setView('print')} className="bg-white p-10 rounded-3xl shadow-xl border-b-8 border-purple-500 hover:-translate-y-1 transition-all">
                            <span className="text-4xl block mb-2">🖨️</span>
                            <span className="font-black text-xl">CARTES QR</span>
                        </button>
                    </div>
                </div>
            );

            if (view === 'teacher') {
                const q = QUESTIONS[session.module][session.currentQ];
                return (
                    <div className="min-h-screen flex flex-col bg-slate-50">
                        <header className="bg-white p-4 shadow-sm flex justify-between items-center border-b">
                            <button onClick={() => setView('menu')} className="font-black text-slate-400">← QUITTER</button>
                            <div className="font-black uppercase tracking-tighter text-xl">SESSION : {session.module}</div>
                            <button onClick={resetVotes} className="bg-red-50 text-red-500 px-4 py-2 rounded-xl font-bold">RESET</button>
                        </header>

                        <div className="p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-2">
                                <button onClick={() => updateCloud({currentQ: Math.max(0, session.currentQ - 1), showAnswers: false})} className="w-12 h-12 bg-white rounded-xl shadow-sm border font-black">◀</button>
                                <div className="px-6 py-2 bg-white rounded-xl border font-black text-xl">Q{session.currentQ + 1}</div>
                                <button onClick={() => updateCloud({currentQ: Math.min(QUESTIONS[session.module].length-1, session.currentQ + 1), showAnswers: false})} className="w-12 h-12 bg-white rounded-xl shadow-sm border font-black">▶</button>
                            </div>
                            <button onClick={() => updateCloud({showAnswers: !session.showAnswers})} className={`px-10 py-4 rounded-2xl font-black text-xl shadow-xl ${session.showAnswers ? 'bg-zinc-800 text-white' : 'bg-amber-500 text-white animate-pulse'}`}>
                                {session.showAnswers ? "MASQUER LA RÉPONSE" : "RÉVÉLER LA RÉPONSE"}
                            </button>
                        </div>

                        <div className="flex-1 p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
                            <div className="lg:col-span-3 space-y-6">
                                <div className="bg-white p-12 rounded-[2.5rem] shadow-sm border-b-8 border-zinc-200">
                                    <h2 className="text-4xl font-black text-center">{q.q}</h2>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {q.a.map((ans, i) => (
                                        <div key={i} className={`p-6 rounded-3xl border-4 flex items-center gap-6 ${session.showAnswers && i === q.c ? 'bg-green-100 border-green-500 text-green-700' : 'bg-white border-transparent shadow-sm'}`}>
                                            <span className="w-10 h-10 bg-black text-white flex items-center justify-center rounded-xl font-black">{"ABCD"[i]}</span>
                                            <span className="text-2xl font-bold">{ans}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-zinc-100 flex flex-col">
                                <h3 className="font-black text-xl mb-4 text-zinc-400 uppercase tracking-widest">Votes ({Object.keys(responses).length})</h3>
                                <div className="grid grid-cols-2 gap-2 overflow-y-auto">
                                    {STUDENTS.map(s => {
                                        const r = responses[s.id];
                                        const active = !!r;
                                        const correct = active && session.showAnswers && r.answerIdx === q.c;
                                        const wrong = active && session.showAnswers && r.answerIdx !== q.c;
                                        return (
                                            <div key={s.id} className={`p-3 rounded-2xl border text-center transition-all ${correct ? 'bg-green-500 text-white border-green-600' : wrong ? 'bg-red-400 text-white' : active ? 'bg-blue-600 text-white animate-pulse' : 'bg-slate-50 text-slate-300 border-slate-100'}`}>
                                                <div className="text-[10px] font-black opacity-50">#{s.id}</div>
                                                <div className="text-[12px] font-black uppercase truncate">{s.name.split(' ')[1]}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'scanner') return <ScannerComp onScan={submitVote} setView={setView} />;

            if (view === 'print') return (
                <div className="bg-white min-h-screen p-8">
                    <div className="no-print mb-8 flex justify-between items-center bg-slate-50 p-6 rounded-3xl border">
                        <button onClick={() => setView('menu')} className="font-black text-slate-500">← RETOUR</button>
                        <button onClick={() => window.print()} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg">IMPRIMER LES CARTES</button>
                    </div>
                    <div className="max-w-[21cm] mx-auto space-y-8">
                        {STUDENTS.map(s => (
                            <div key={s.id} className="grid grid-cols-2 gap-4 page-break">
                                {["A", "B", "C", "D"].map(L => (
                                    <div key={L} className="border-4 border-black rounded-[2rem] p-6 flex flex-col items-center justify-between h-[13cm]">
                                        <div className="text-8xl font-black">{L}</div>
                                        <LocalQR text={`${s.id}-${L}`} />
                                        <div className="text-center">
                                            <div className="font-black text-xl uppercase italic">Prof. A. RADOUANI</div>
                                            <div className="text-sm font-bold text-slate-400">ID: {s.id} | {s.name}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
