<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLICKERS LIVE | Prof. A. RADOUANI</title>

    <!-- React + Babel + Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- QR Code: scanner + générateur -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- CSS global -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!--
    ╔══════════════════════════════════════════╗
    ║         ORDRE DE CHARGEMENT              ║
    ╠══════════════════════════════════════════╣
    ║  1. firebase-config.js  (données)        ║
    ║  2. components/auth.js                   ║
    ║  3. components/dashboard.js  (+ LocalQR) ║
    ║  4. components/scanner.js                ║
    ║  5. components/print.js                  ║
    ║  6. components/creator.js                ║
    ║  7. app.js              (routing global) ║
    ╚══════════════════════════════════════════╝

    BACH TZID VIEW JDIDA:
    → Zid fichier f js/components/
    → Import-o hna (type="text/babel")
    → Zid case f switch dyal js/app.js
    → Zid bouton f menu dyal js/app.js
    -->

    <!-- 1. Config + données -->
    <script type="text/babel" src="js/firebase-config.js"></script>

    <!-- 2-6. Composants vues -->
    <script type="text/babel" src="js/components/auth.js"></script>
    <script type="text/babel" src="js/components/dashboard.js"></script>
    <script type="text/babel" src="js/components/scanner.js"></script>
    <script type="text/babel" src="js/components/print.js"></script>
    <script type="text/babel" src="js/components/creator.js"></script>

    <!-- 7. App principale (doit être en dernier) -->
    <script type="text/babel" src="js/app.js"></script>
</body>
</html>
