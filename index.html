<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plickers Master - Prof A. RADOUANI</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            .page-break { page-break-after: always !important; }
            body { background: white !important; }
        }
    </style>
</head>
<body class="bg-zinc-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- BANQUE DE QUESTIONS (40 WORD + 40 EXCEL) ---
        // (J'ai mis un échantillon, tu peux rajouter les autres ici)
        const QUESTION_BANKS = {
            word: [
                { q: "Lequel n'est pas un logiciel de traitement de texte ?", a: ["Microsoft Word", "Google Docs", "Microsoft Excel", "LibreOffice Writer"], c: 2 },
                { q: "Comment appelle-t-on la barre située tout en haut ?", a: ["Barre d'état", "Barre de titre", "Le ruban", "Barre de défilement"], c: 1 }
            ],
            excel: [
                { q: "Rôle principal de Microsoft Excel ?", a: ["Lettres", "Calculs et Tableaux", "Diaporamas", "Internet"], c: 1 },
                { q: "Adresse cellule Colonne B / Ligne 5 ?", a: ["5B", "B-5", "B5", "BB5"], c: 2 }
            ]
        };

        const DEFAULT_STUDENTS = Array.from({ length: 30 }, (_, i) => ({ id: (i + 1).toString(), name: `Élève ${i + 1}` }));

        // --- COMPOSANT QR CODE ---
        const LocalQRCode = ({ data, size = 150 }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.qrcode) {
                    const qr = qrcode(0, 'L');
                    qr.addData(data);
                    qr.make();
                    containerRef.current.innerHTML = qr.createSvgTag(5, 0);
                }
            }, [data]);
            return <div ref={containerRef} className="flex items-center justify-center bg-white" style={{width: size, height: size}} />;
        };

        // --- APPLICATION ---
        function App() {
            const [view, setView] = useState('menu');
            const [module, setModule] = useState('excel');
            const [currentQ, setCurrentQ] = useState(0);
            const [showAnswers, setShowAnswers] = useState(false);
            const [responses, setResponses] = useState({});

            const resetQuiz = () => {
                setResponses({});
                setShowAnswers(false);
                setCurrentQ(0);
            };

            // Vue Menu
            if (view === 'menu') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50">
                        <h1 className="text-5xl font-black text-slate-900 mb-2 italic">PLICKERS MASTER</h1>
                        <p className="text-slate-400 font-bold mb-10 tracking-widest uppercase">Prof. A. RADOUANI</p>
                        
                        <div className="flex gap-4 mb-10 bg-white p-3 rounded-2xl shadow-sm border">
                            <button onClick={() => setModule('word')} className={`px-8 py-3 rounded-xl font-bold transition-all ${module === 'word' ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>WORD</button>
                            <button onClick={() => setModule('excel')} className={`px-8 py-3 rounded-xl font-bold transition-all ${module === 'excel' ? 'bg-green-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>EXCEL</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl">
                            <button onClick={() => setView('teacher')} className="bg-white p-10 rounded-[2.5rem] shadow-xl border-b-8 border-blue-600 hover:translate-y-[-5px] transition-all">
                                <div className="text-5xl mb-4">💻</div>
                                <div className="font-black text-xl text-slate-800">DASHBOARD</div>
                            </button>
                            <button onClick={() => { alert("Le scan nécessite Firebase. Utilisez le Dashboard pour l'instant."); }} className="bg-white p-10 rounded-[2.5rem] shadow-xl border-b-8 border-green-500 hover:translate-y-[-5px] transition-all">
                                <div className="text-5xl mb-4">📸</div>
                                <div className="font-black text-xl text-slate-800">SCANNER</div>
                            </button>
                            <button onClick={() => setView('print')} className="bg-white p-10 rounded-[2.5rem] shadow-xl border-b-8 border-purple-500 hover:translate-y-[-5px] transition-all">
                                <div className="text-5xl mb-4">🖨️</div>
                                <div className="font-black text-xl text-slate-800">CARTES</div>
                            </button>
                        </div>
                    </div>
                );
            }

            // Vue Dashboard
            if (view === 'teacher') {
                const questions = QUESTION_BANKS[module];
                const q = questions[currentQ];

                return (
                    <div className="min-h-screen flex flex-col bg-slate-100">
                        <div className="bg-white p-4 flex justify-between items-center shadow-sm border-b">
                            <button onClick={() => setView('menu')} className="font-bold text-slate-400 hover:text-slate-900">← QUITTER</button>
                            <div className="font-black uppercase text-slate-800">{module} Session</div>
                            <button onClick={resetQuiz} className="text-red-500 font-bold">RESET</button>
                        </div>

                        <div className="p-6 flex flex-col md:flex-row gap-6 justify-between items-center bg-white shadow-sm sticky top-0 z-10">
                            <div className="flex items-center gap-4">
                                <button onClick={() => {setCurrentQ(Math.max(0, currentQ - 1)); setShowAnswers(false);}} className="bg-slate-100 p-4 rounded-2xl font-bold">◀</button>
                                <div className="text-center min-w-[100px]">
                                    <span className="block text-[10px] font-black text-slate-400">QUESTION</span>
                                    <span className="text-3xl font-black">{currentQ + 1} / {questions.length}</span>
                                </div>
                                <button onClick={() => {setCurrentQ(Math.min(questions.length - 1, currentQ + 1)); setShowAnswers(false);}} className="bg-slate-100 p-4 rounded-2xl font-bold">▶</button>
                            </div>
                            <button onClick={() => setShowAnswers(!showAnswers)} className={`px-12 py-4 rounded-full font-black text-xl shadow-lg transition-all ${showAnswers ? 'bg-slate-800 text-white' : 'bg-amber-500 text-white'}`}>
                                {showAnswers ? "MASQUER RÉPONSE" : "VOIR LA RÉPONSE"}
                            </button>
                        </div>

                        <div className="flex-1 p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
                            <div className="lg:col-span-3 space-y-6">
                                <div className="bg-white p-12 rounded-[2.5rem] shadow-xl border-b-8 border-slate-200">
                                    <h3 className="text-4xl md:text-5xl font-black text-slate-800">{q.q}</h3>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {q.a.map((opt, i) => (
                                        <div key={i} className={`p-6 rounded-3xl border-4 flex items-center gap-6 text-2xl font-black transition-all ${showAnswers && i === q.c ? 'bg-green-100 border-green-500 text-green-700' : 'bg-white border-white shadow-sm'}`}>
                                            <span className="w-12 h-12 bg-slate-900 text-white rounded-xl flex items-center justify-center">{ "ABCD"[i] }</span>
                                            {opt}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-white rounded-[2.5rem] shadow-xl p-6 overflow-y-auto">
                                <h4 className="font-black text-xl mb-4 border-b pb-2 italic">RÉSULTATS LIVE</h4>
                                <p className="text-xs text-slate-400 mb-4 uppercase">Simulé (Hébergement requis pour Live)</p>
                                <div className="grid grid-cols-2 gap-2">
                                    {DEFAULT_STUDENTS.map(s => (
                                        <div key={s.id} className="p-3 rounded-xl bg-slate-50 border text-[10px] font-bold text-slate-300">
                                            #{s.id} {s.name.split(' ')[1]}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Vue Impression
            if (view === 'print') {
                return (
                    <div className="p-8 bg-white min-h-screen">
                        <div className="no-print flex justify-between items-center mb-10 bg-slate-50 p-6 rounded-3xl border">
                            <button onClick={() => setView('menu')} className="bg-slate-800 text-white px-8 py-3 rounded-2xl font-bold">← RETOUR</button>
                            <h2 className="text-2xl font-black">IMPRESSION DES CARTES (4 PAR ÉLÈVE)</h2>
                            <button onClick={() => window.print()} className="bg-blue-600 text-white px-10 py-3 rounded-2xl font-black shadow-lg">IMPRIMER</button>
                        </div>
                        <div className="flex flex-col gap-10 items-center">
                            {DEFAULT_STUDENTS.map(s => (
                                <div key={s.id} className="grid grid-cols-2 gap-4 w-full h-[28cm] max-w-[21cm] page-break p-4">
                                    {["A", "B", "C", "D"].map(L => (
                                        <div key={L} className="border-8 border-black p-8 flex flex-col items-center justify-between h-[13.2cm] rounded-[3rem] bg-white relative">
                                            <div className="text-9xl font-black">{L}</div>
                                            <LocalQRCode data={`${s.id}-${L}`} size={180} />
                                            <div className="text-center font-black uppercase text-xl">
                                                <div>{s.name}</div>
                                                <div className="text-xs text-slate-400 tracking-widest mt-1">ID: {s.id} | QUIZ 1APIC</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
