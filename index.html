<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLICKERS LIVE | Prof. A. RADOUANI</title>
    
    <!-- Scripts de base -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Bibliothèques Utilitaires -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        @media print {
            .no-print { display: none !important; }
            .page-break { page-break-after: always !important; }
            body { background: white !important; }
        }
        #reader video { border-radius: 1.5rem; object-fit: cover; width: 100% !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. CONFIGURATION FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAF7aaeksLKsjCBLhDzTDpJjfv8fapq8WM",
            authDomain: "excel-e3987.firebaseapp.com",
            projectId: "excel-e3987",
            storageBucket: "excel-e3987.firebasestorage.app",
            messagingSenderId: "916795973569",
            appId: "1:916795973569:web:4b51c831384f9d9c845940",
            measurementId: "G-Z8B1GNY2QK"
        };
        
        const appId = "plickers-1apic-radouani-live";

        // ==========================================
        // 2. BANQUES DE QUESTIONS STANDARDS
        // ==========================================
        const DEFAULT_QUESTIONS = {
            word: [
                { q: "Lequel n'est pas un logiciel de traitement de texte ?", a: ["Microsoft Word", "Google Docs", "Microsoft Excel", "LibreOffice Writer"], c: 2 },
                { q: "Comment s'appelle la barre tout en haut ?", a: ["Barre d'état", "Barre de titre", "Ruban", "Défilement"], c: 1 },
                { q: "Icône de la disquette signifie ?", a: ["Imprimer", "Enregistrer", "Ouvrir", "Copier"], c: 1 },
                { q: "Ctrl + A permet de :", a: ["Annuler", "Tout sélectionner", "Agrandir", "Aligner"], c: 1 },
                { q: "Orientation 'Paysage' est :", a: ["Verticale", "Horizontale", "Carrée", "Inclinée"], c: 1 },
                { q: "Changer la police se fait dans l'onglet :", a: ["Insertion", "Accueil", "Affichage", "Révision"], c: 1 },
                { q: "Effacer à GAUCHE du curseur ?", a: ["Suppr", "Retour arrière", "Espace", "Entrée"], c: 1 },
                { q: "Le bouton 'S' souligné fait :", a: ["Gras", "Italique", "Souligné", "Barré"], c: 2 },
                { q: "Taille de police se mesure en :", a: ["cm", "pixels", "points (pt)", "kg"], c: 2 },
                { q: "Ctrl + P sert à :", a: ["Partager", "Imprimer", "Police", "Paragraphe"], c: 1 }
                // ... (Reste des questions Word)
            ],
            excel: [
                { q: "Rôle de Microsoft Excel ?", a: ["Lettres", "Calculs et Tableaux", "Diaporamas", "Web"], c: 1 },
                { q: "Fichier Excel s'appelle :", a: ["Document", "Classeur", "Présentation", "Image"], c: 1 },
                { q: "Les colonnes sont des :", a: ["Chiffres", "Lettres (A, B...)", "Points", "Mots"], c: 1 },
                { q: "Les lignes sont des :", a: ["Chiffres (1, 2...)", "Lettres", "Signes", "Titres"], c: 0 },
                { q: "Intersection ligne/colonne ?", a: ["Carré", "Cellule", "Lien", "Bouton"], c: 1 }
                // ... (Reste des questions Excel)
            ],
            google: [
                { q: "Quel est le moteur de recherche le plus utilisé ?", a: ["Bing", "Yahoo", "Google", "DuckDuckGo"], c: 2 },
                { q: "Quel service Google permet de stocker des fichiers ?", a: ["Gmail", "Google Drive", "Maps", "YouTube"], c: 1 },
                { q: "Comment s'appelle l'IA de Google ?", a: ["Siri", "Alexa", "Gemini", "ChatGPT"], c: 2 },
                { q: "Pour ouvrir un nouvel onglet Chrome :", a: ["Ctrl + T", "Ctrl + N", "Ctrl + W", "Ctrl + P"], c: 0 },
                { q: "Espace gratuit sur Google Drive :", a: ["5 Go", "15 Go", "50 Go", "100 Go"], c: 1 }
            ]
        };

        const STUDENTS = Array.from({ length: 30 }, (_, i) => ({ id: (i + 1).toString(), name: `Élève ${i + 1}` }));

        // Components
        const LocalQR = ({ text }) => {
            const divRef = useRef(null);
            useEffect(() => {
                if (window.qrcode) {
                    const qr = qrcode(0, 'L');
                    qr.addData(text);
                    qr.make();
                    divRef.current.innerHTML = qr.createSvgTag(4, 0);
                }
            }, [text]);
            return <div ref={divRef} className="flex justify-center bg-white p-2"></div>;
        };

        const ScannerView = ({ submitVote, setView }) => {
            const [last, setLast] = useState(null);
            const scannerRef = useRef(null);
            useEffect(() => {
                const scanner = new Html5Qrcode("reader");
                scannerRef.current = scanner;
                scanner.start(
                    { facingMode: "environment" },
                    { fps: 20, qrbox: 250 },
                    (text) => {
                        const parts = text.split('-');
                        if (parts.length === 2) {
                            const [sId, char] = parts;
                            const idx = "ABCD".indexOf(char);
                            if (idx !== -1) {
                                submitVote(sId, idx);
                                setLast(`S${sId}:${char} ✅`);
                                if (navigator.vibrate) navigator.vibrate(50);
                            }
                        }
                    }
                ).catch(console.error);
                return () => { if (scannerRef.current) scannerRef.current.stop(); };
            }, []);

            return (
                <div className="min-h-screen bg-black text-white flex flex-col font-sans">
                    <header className="p-4 flex justify-between bg-zinc-900 border-b border-white/10">
                        <button onClick={() => setView('menu')} className="font-bold underline text-blue-400">← RETOUR</button>
                        <h2 className="font-black italic uppercase">SCANNER LIVE</h2>
                        <div className="w-10"></div>
                    </header>
                    <div id="reader" className="flex-1"></div>
                    {last && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-green-500 px-8 py-4 rounded-full font-black text-xl animate-bounce shadow-2xl z-50">{last}</div>}
                </div>
            );
        };

        const AuthPage = () => {
            const [isSignUp, setIsSignUp] = useState(false);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [err, setErr] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setErr("");
                if (isSignUp) {
                    firebase.auth().createUserWithEmailAndPassword(email, pass)
                        .catch(e => setErr(e.message));
                } else {
                    firebase.auth().signInWithEmailAndPassword(email, pass)
                        .catch(() => setErr("Email ou mot de passe incorrect!"));
                }
            };

            return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-900 font-sans">
                    <form onSubmit={handleSubmit} className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md border-b-[16px] border-blue-600">
                        <div className="text-center mb-8">
                           <h1 className="text-4xl font-black italic tracking-tighter uppercase text-slate-900">Admin Login</h1>
                           <p className="text-slate-400 font-bold uppercase text-xs tracking-widest mt-2">Accès Professeur</p>
                        </div>
                        <div className="space-y-4">
                            <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-blue-500 font-bold" required />
                            <input type="password" placeholder="Mot de passe" value={pass} onChange={e=>setPass(e.target.value)} className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-blue-500 font-bold" required />
                            {err && <p className="text-red-500 font-bold text-center text-sm">{err}</p>}
                            <button className="w-full bg-blue-600 hover:bg-blue-700 text-white p-5 rounded-2xl font-black text-xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                                {isSignUp ? "S'INSCRIRE" : "SE CONNECTER"}
                            </button>
                            <div className="text-center mt-4">
                                <button type="button" onClick={() => setIsSignUp(!isSignUp)} className="text-blue-600 font-bold text-sm underline decoration-blue-200">
                                    {isSignUp ? "J'ai déjà un compte (Login)" : "Pas de compte ? S'inscrire"}
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            );
        };

        const CreateQuizView = ({ onSave, onCancel }) => {
            const [title, setTitle] = useState('');
            const [questions, setQuestions] = useState([{ q: '', a: ['', '', '', ''], c: 0 }]);

            const addQuestion = () => setQuestions([...questions, { q: '', a: ['', '', '', ''], c: 0 }]);
            
            const updateQ = (idx, field, val) => {
                const newQs = [...questions];
                newQs[idx][field] = val;
                setQuestions(newQs);
            };

            const updateA = (qIdx, aIdx, val) => {
                const newQs = [...questions];
                newQs[qIdx].a[aIdx] = val;
                setQuestions(newQs);
            };

            const handleSave = () => {
                if(!title || questions.some(q => !q.q)) {
                    alert("Veuillez remplir le titre et toutes les questions.");
                    return;
                }
                onSave({ title, questions, id: 'custom_' + Date.now() });
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col font-sans p-6">
                    <div className="max-w-4xl mx-auto w-full">
                        <header className="flex justify-between items-center mb-8">
                            <h2 className="text-3xl font-black italic text-slate-900">CRÉER UN QUIZ</h2>
                            <button onClick={onCancel} className="text-slate-400 font-bold hover:text-red-500">ANNULER</button>
                        </header>
                        
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border mb-6">
                            <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Titre du Quiz</label>
                            <input 
                                type="text" 
                                placeholder="Ex: Mon Quiz Informatique" 
                                value={title}
                                onChange={e => setTitle(e.target.value)}
                                className="w-full text-2xl font-black p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-blue-500"
                            />
                        </div>

                        <div className="space-y-6">
                            {questions.map((q, idx) => (
                                <div key={idx} className="bg-white p-8 rounded-[2.5rem] shadow-lg border relative">
                                    <span className="absolute -top-4 -left-4 w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center font-black">
                                        {idx + 1}
                                    </span>
                                    <div className="mb-4">
                                        <label className="block text-[10px] font-black text-slate-400 uppercase mb-1">Question</label>
                                        <input 
                                            type="text" 
                                            value={q.q}
                                            onChange={e => updateQ(idx, 'q', e.target.value)}
                                            className="w-full p-4 bg-slate-50 border rounded-xl font-bold"
                                        />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {q.a.map((ans, aidx) => (
                                            <div key={aidx} className="flex items-center gap-2">
                                                <button 
                                                    onClick={() => updateQ(idx, 'c', aidx)}
                                                    className={`w-10 h-10 rounded-lg font-black transition-all ${q.c === aidx ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-400'}`}
                                                >
                                                    {"ABCD"[aidx]}
                                                </button>
                                                <input 
                                                    type="text" 
                                                    value={ans}
                                                    onChange={e => updateA(idx, aidx, e.target.value)}
                                                    className="flex-1 p-3 bg-slate-50 border rounded-xl text-sm"
                                                />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="mt-10 flex gap-4">
                            <button onClick={addQuestion} className="flex-1 p-5 bg-white border-4 border-dashed border-slate-200 text-slate-400 rounded-[2rem] font-black hover:border-blue-300 hover:text-blue-500 transition-all">+ AJOUTER QUESTION</button>
                            <button onClick={handleSave} className="flex-1 p-5 bg-green-500 text-white rounded-[2rem] font-black text-xl shadow-lg shadow-green-100 active:scale-95 transition-all">ENREGISTRER QUIZ</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('menu'); // menu, teacher, scanner, print, create
            const [session, setSession] = useState({ currentQ: 0, showAnswers: false, module: 'excel' });
            const [responses, setResponses] = useState({});
            const [customQuizzes, setCustomQuizzes] = useState([]);
            const [loading, setLoading] = useState(true);
            const fireDB = useRef(null);

            useEffect(() => {
                const init = async () => {
                    if (!window.firebase) { setTimeout(init, 200); return; }
                    try {
                        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                        const db = firebase.firestore();
                        const auth = firebase.auth();
                        fireDB.current = db;

                        auth.onAuthStateChanged(u => {
                            setUser(u);
                            if (u) {
                                // SYNC SESSION (RULE 1: 6 segments obligatoire)
                                const sessionRef = db.doc(`artifacts/${appId}/public/data/config/session`);
                                sessionRef.onSnapshot(snap => {
                                    if (snap.exists) setSession(snap.data());
                                    else sessionRef.set({ currentQ: 0, showAnswers: false, module: 'excel' });
                                });

                                // SYNC RESPONSES (RULE 1: 5 segments)
                                db.collection(`artifacts/${appId}/public/data/responses`).onSnapshot(snap => {
                                    const d = {};
                                    snap.forEach(doc => d[doc.id] = doc.data());
                                    setResponses(d);
                                });

                                // SYNC CUSTOM QUIZZES (PRIVATE)
                                db.collection(`artifacts/${appId}/users/${u.uid}/quizzes`).onSnapshot(snap => {
                                    const d = [];
                                    snap.forEach(doc => d.push(doc.data()));
                                    setCustomQuizzes(d);
                                });
                            }
                            setLoading(false);
                        });
                    } catch (e) {
                        console.error(e);
                        setLoading(false);
                    }
                };
                init();
            }, []);

            const saveCustomQuiz = async (quiz) => {
                if (fireDB.current && user) {
                    await fireDB.current.doc(`artifacts/${appId}/users/${user.uid}/quizzes/${quiz.id}`).set(quiz);
                    setView('menu');
                }
            };

            const updateCloud = async (up) => {
                if (fireDB.current && user) await fireDB.current.doc(`artifacts/${appId}/public/data/config/session`).set(up, {merge: true});
            };

            const submitVote = async (sId, aIdx) => {
                if (fireDB.current && user) await fireDB.current.doc(`artifacts/${appId}/public/data/responses/${sId}`).set({ answerIdx: aIdx, t: Date.now() });
            };

            const resetVotes = async () => {
                if (!fireDB.current || !user) return;
                await updateCloud({ showAnswers: false });
                const snap = await fireDB.current.collection(`artifacts/${appId}/public/data/responses`).get();
                const batch = fireDB.current.batch();
                snap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
            };

            if (loading) return <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white font-black animate-pulse font-sans">
                <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                CHARGEMENT...
            </div>;

            if (!user) return <AuthPage />;

            // Récupérer la banque de questions actuelle (Standard ou Custom)
            const getActiveQuestions = () => {
                if (DEFAULT_QUESTIONS[session.module]) return DEFAULT_QUESTIONS[session.module];
                const found = customQuizzes.find(q => q.id === session.module);
                return found ? found.questions : DEFAULT_QUESTIONS.word;
            };

            if (view === 'create') return <CreateQuizView onSave={saveCustomQuiz} onCancel={() => setView('menu')} />;

            if (view === 'menu') return (
                <div className="min-h-screen flex flex-col bg-slate-50 font-sans">
                    <nav className="p-4 bg-white shadow-sm flex justify-between items-center border-b">
                        <span className="font-black italic text-blue-600 uppercase">Prof. Radouani</span>
                        <button onClick={() => firebase.auth().signOut()} className="text-[10px] font-bold bg-red-50 text-red-500 px-3 py-1 rounded-lg">Log Out</button>
                    </nav>
                    
                    <div className="flex-1 flex flex-col items-center justify-center p-6 gap-8">
                        <div className="text-center">
                            <h1 className="text-6xl md:text-8xl font-black italic tracking-tighter text-slate-900 uppercase leading-none">PLICKERS<span className="text-blue-600">.</span></h1>
                            <p className="text-slate-400 font-bold uppercase tracking-[0.4em] text-sm mt-4">Évaluation 1APIC & Projets</p>
                        </div>
                        
                        <div className="bg-white p-3 rounded-[2.5rem] shadow-xl border w-full max-w-5xl overflow-x-auto">
                            <div className="flex justify-center gap-3 min-w-max px-4">
                                <button onClick={() => updateCloud({module: 'word', currentQ: 0, showAnswers: false})} className={`px-6 py-2 rounded-2xl font-black transition-all ${session.module === 'word' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 bg-slate-50'}`}>WORD</button>
                                <button onClick={() => updateCloud({module: 'excel', currentQ: 0, showAnswers: false})} className={`px-6 py-2 rounded-2xl font-black transition-all ${session.module === 'excel' ? 'bg-green-600 text-white shadow-lg' : 'text-slate-400 bg-slate-50'}`}>EXCEL</button>
                                <button onClick={() => updateCloud({module: 'google', currentQ: 0, showAnswers: false})} className={`px-6 py-2 rounded-2xl font-black transition-all ${session.module === 'google' ? 'bg-amber-500 text-white shadow-lg' : 'text-slate-400 bg-slate-50'}`}>GOOGLE</button>
                                {customQuizzes.map(q => (
                                    <button key={q.id} onClick={() => updateCloud({module: q.id, currentQ: 0, showAnswers: false})} className={`px-6 py-2 rounded-2xl font-black transition-all ${session.module === q.id ? 'bg-purple-600 text-white shadow-lg' : 'text-purple-400 bg-purple-50'}`}>{q.title}</button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-6xl">
                            <button onClick={() => setView('teacher')} className="bg-white p-8 rounded-[2.5rem] shadow-lg border-b-[12px] border-blue-600 hover:-translate-y-2 transition-all font-black text-center group">
                                <span className="block text-4xl mb-3 group-hover:scale-110 transition-transform">📊</span>
                                DASHBOARD
                            </button>
                            <button onClick={() => setView('scanner')} className="bg-white p-8 rounded-[2.5rem] shadow-lg border-b-[12px] border-green-500 hover:-translate-y-2 transition-all font-black text-center group">
                                <span className="block text-4xl mb-3 group-hover:scale-110 transition-transform">📸</span>
                                SCANNER
                            </button>
                            <button onClick={() => setView('print')} className="bg-white p-8 rounded-[2.5rem] shadow-lg border-b-[12px] border-purple-500 hover:-translate-y-2 transition-all font-black text-center group">
                                <span className="block text-4xl mb-3 group-hover:scale-110 transition-transform">🖨️</span>
                                CARTES QR
                            </button>
                            <button onClick={() => setView('create')} className="bg-slate-800 p-8 rounded-[2.5rem] shadow-lg border-b-[12px] border-amber-500 hover:-translate-y-2 transition-all font-black text-center group text-white">
                                <span className="block text-4xl mb-3 group-hover:scale-110 transition-transform">✨</span>
                                CRÉER QUIZ
                            </button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'teacher') {
                const qList = getActiveQuestions();
                const q = qList[session.currentQ] || qList[0];
                return (
                    <div className="min-h-screen flex flex-col bg-slate-50 font-sans text-slate-900">
                        <header className="bg-white p-4 flex justify-between items-center border-b sticky top-0 z-20 shadow-sm">
                            <button onClick={() => setView('menu')} className="font-black text-slate-400 uppercase text-xs">← Menu</button>
                            <div className="font-black uppercase tracking-widest text-slate-800">LIVE SESSION : {session.module}</div>
                            <button onClick={resetVotes} className="bg-red-50 text-red-500 px-4 py-1 rounded-xl font-bold text-xs uppercase hover:bg-red-500 hover:text-white transition-all">Reset</button>
                        </header>

                        <div className="p-6 bg-white border-b flex flex-col md:flex-row justify-between items-center gap-6 shadow-md">
                            <div className="flex items-center gap-4">
                                <button onClick={() => updateCloud({currentQ: Math.max(0, session.currentQ - 1), showAnswers: false})} className="p-4 bg-zinc-100 rounded-2xl border font-bold text-xl active:bg-zinc-200">◀</button>
                                <div className="text-center bg-zinc-50 px-8 py-2 rounded-2xl border min-w-[150px]">
                                    <span className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest">Question</span>
                                    <span className="text-4xl font-black text-slate-900">{session.currentQ + 1} / {qList.length}</span>
                                </div>
                                <button onClick={() => updateCloud({currentQ: Math.min(qList.length-1, session.currentQ + 1), showAnswers: false})} className="p-4 bg-zinc-100 rounded-2xl border font-bold text-xl active:bg-zinc-200">▶</button>
                            </div>
                            <button onClick={() => updateCloud({showAnswers: !session.showAnswers})} className={`px-16 py-5 rounded-full font-black text-2xl shadow-2xl transition-all active:scale-95 ${session.showAnswers ? 'bg-zinc-800 text-white' : 'bg-amber-500 text-white shadow-amber-200 animate-pulse'}`}>
                                {session.showAnswers ? "MASQUER RÉPONSE" : "VOIR LA RÉPONSE"}
                            </button>
                        </div>

                        <div className="flex-1 p-6 grid grid-cols-1 lg:grid-cols-4 gap-8 overflow-hidden">
                            <div className="lg:col-span-3 space-y-6 overflow-y-auto pb-20 pr-2 custom-scrollbar">
                                <div className="bg-white p-12 rounded-[3.5rem] shadow-xl border-b-[16px] border-zinc-200 text-center">
                                    <h3 className="text-3xl md:text-5xl font-black text-zinc-900 leading-tight">{q.q}</h3>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
                                    {q.a.map((ans, i) => (
                                        <div key={i} className={`p-8 rounded-[2.5rem] border-4 flex items-center gap-8 transition-all duration-700 ${session.showAnswers && i === q.c ? 'bg-green-100 border-green-500 text-green-800 scale-[1.03] shadow-xl shadow-green-100' : 'bg-white border-transparent shadow-sm'}`}>
                                            <span className={`w-16 h-16 md:w-20 md:h-20 rounded-[1.5rem] flex items-center justify-center text-4xl font-black shadow-inner ${session.showAnswers && i === q.c ? 'bg-green-600 text-white animate-bounce' : 'bg-slate-900 text-white'}`}>{"ABCD"[i]}</span>
                                            <span className="text-2xl md:text-3xl font-black leading-tight text-slate-900">{ans}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-white rounded-[3rem] shadow-2xl p-6 flex flex-col border-t-[12px] border-zinc-100 overflow-hidden">
                                <h4 className="text-2xl font-black text-zinc-900 mb-6 uppercase tracking-tighter italic">VOTES ({Object.keys(responses).length})</h4>
                                <div className="grid grid-cols-2 gap-3 overflow-y-auto pr-1 pb-6 custom-scrollbar">
                                    {STUDENTS.map(s => {
                                        const res = responses[s.id];
                                        const color = res ? (session.showAnswers ? (res.answerIdx === q.c ? 'bg-green-500 text-white shadow-md border-green-600' : 'bg-red-400 text-white shadow-md border-red-500') : 'bg-blue-600 text-white animate-pulse shadow-lg shadow-blue-100') : 'bg-slate-50 border-slate-100 text-slate-300';
                                        return (
                                            <div key={s.id} className={`p-4 rounded-3xl border-2 flex flex-col items-center justify-center transition-all duration-500 ${color}`}>
                                                <div className="flex items-center gap-1 mb-1">
                                                    <span className="text-[8px] font-black opacity-50 text-inherit">#{s.id}</span>
                                                    {res && <span className="px-2 py-0.5 rounded-lg font-black text-[10px] bg-white/20 text-inherit">{"ABCD"[res.answerIdx]}</span>}
                                                </div>
                                                <span className="font-black text-[10px] uppercase truncate w-full text-center leading-none text-inherit">{s.name.split(' ')[1]}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'scanner') return <ScannerView submitVote={submitVote} setView={setView} />;

            if (view === 'print') return (
                <div className="bg-white min-h-screen p-8 font-sans text-slate-900">
                    <button onClick={() => setView('menu')} className="no-print mb-10 bg-black text-white px-10 py-4 rounded-2xl font-black shadow-xl uppercase transition-all active:scale-95">← Retour au menu</button>
                    <div className="max-w-[21cm] mx-auto space-y-12">
                        {STUDENTS.map(s => (
                            <div key={s.id} className="grid grid-cols-2 gap-6 page-break py-4">
                                {["A", "B", "C", "D"].map(L => (
                                    <div key={L} className="border-[10px] border-black rounded-[4rem] p-10 flex flex-col items-center justify-between h-[13.5cm] bg-white relative">
                                        <div className="text-9xl font-black leading-none text-black">{L}</div>
                                        <LocalQR text={`${s.id}-${L}`} />
                                        <div className="text-center w-full border-t-4 border-black pt-6">
                                            <div className="font-black text-3xl uppercase tracking-tighter text-black">{s.name}</div>
                                            <div className="text-sm font-bold text-slate-400 uppercase tracking-[0.2em] mt-2 italic">MASTER EVALUATION 1APIC</div>
                                        </div>
                                        <div className="absolute top-8 right-8 font-black opacity-5 text-8xl select-none text-black">{L}</div>
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
