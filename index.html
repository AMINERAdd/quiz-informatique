        const LocalQR = ({ text }) => {
            const divRef = useRef(null);
            useEffect(() => {
                if (window.qrcode) {
                    const qr = qrcode(0, 'L');
                    qr.addData(text);
                    qr.make();
                    divRef.current.innerHTML = qr.createSvgTag(4, 0);
                }
            }, [text]);
            return <div ref={divRef} className="flex justify-center bg-white p-2"></div>;
        };

        const ScannerView = ({ submitVote, setView }) => {
            const [last, setLast] = useState(null);
            const scannerRef = useRef(null);
            useEffect(() => {
                const scanner = new Html5Qrcode("reader");
                scannerRef.current = scanner;
                scanner.start(
                    { facingMode: "environment" },
                    { fps: 20, qrbox: 250 },
                    (text) => {
                        const parts = text.split('-');
                        if (parts.length === 2) {
                            const [sId, char] = parts;
                            const idx = "ABCD".indexOf(char);
                            if (idx !== -1) {
                                submitVote(sId, idx);
                                setLast(`S${sId}:${char} ✅`);
                                if (navigator.vibrate) navigator.vibrate(50);
                            }
                        }
                    }
                ).catch(console.error);
                return () => { if (scannerRef.current) scannerRef.current.stop(); };
            }, []);

            const [loading, setLoading] = useState(true);
            const fireDB = useRef(null);

            useEffect(() => {
                const init = async () => {
                    if (!window.firebase) { setTimeout(init, 200); return; }
                    try {
                        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                        const db = firebase.firestore();
                        const auth = firebase.auth();
                        fireDB.current = db;

                        auth.onAuthStateChanged(u => {
                            setUser(u);
                            if (u) {
                                // SYNC SESSION (RULE 1: 6 segments obligatoire pour Document)
                                const sessionRef = db.doc(`artifacts/${appId}/public/data/config/session`);
                                sessionRef.onSnapshot(snap => {
                                    if (snap.exists) setSession(snap.data()); // FIX: Use as property
                                    else sessionRef.set({ currentQ: 0, showAnswers: false, module: 'excel' });
                                });

                                // SYNC RESPONSES (RULE 1: 5 segments pour Collection)
                                db.collection(`artifacts/${appId}/public/data/responses`).onSnapshot(snap => {
                                    const d = {};
                                    snap.forEach(doc => d[doc.id] = doc.data());
                                    setResponses(d);
                                });
                            }
                            setLoading(false);
                        });
                    } catch (e) {
                        console.error(e);
                        setLoading(false);
                    }
                };
                init();
            }, []);

            const updateCloud = async (up) => {

            };

            const submitVote = async (sId, aIdx) => {
                if (fireDB.current && user) await fireDB.current.doc(`artifacts/${appId}/public/data/responses/${sId}`).set({ answerIdx: aIdx, t: Date.now() });
            };

            const resetVotes = async () => {
                if (!fireDB.current || !user) return;
                await updateCloud({ showAnswers: false });
                const snap = await fireDB.current.collection(`artifacts/${appId}/public/data/responses`).get();
                const batch = fireDB.current.batch();
                snap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
            };

            if (loading) return <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white font-black animate-pulse uppercase tracking-widest">
                <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                Initialisation...
            </div>;

            if (!user) return <LoginPage />;

            if (view === 'menu') return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <nav className="p-4 bg-white shadow-sm flex justify-between items-center no-print border-b">
                        <span className="font-black italic tracking-tighter text-blue-600 uppercase">Prof. Radouani</span>
                        <button onClick={() => firebase.auth().signOut()} className="text-xs font-bold bg-red-50 text-red-500 px-4 py-2 rounded-xl hover:bg-red-500 hover:text-white transition-all">DÉCONNEXION</button>
                    </nav>
                    
                    <div className="flex-1 flex flex-col items-center justify-center p-6 gap-8">
                        <div className="text-center">
                            <h1 className="text-6xl md:text-8xl font-black italic tracking-tighter text-slate-900 uppercase">PLICKERS<span className="text-blue-600">.</span></h1>
                            <p className="text-slate-400 font-bold uppercase tracking-[0.4em] text-sm mt-4">Évaluation Multimodale 1APIC</p>
                        </div>
                        
                        <div className="flex flex-wrap justify-center gap-4 bg-white p-3 rounded-[2rem] shadow-xl border">
                            <button onClick={() => updateCloud({module: 'word', currentQ: 0, showAnswers: false})} className={`px-8 py-3 rounded-2xl font-black transition-all ${session.module === 'word' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400'}`}>WORD</button>
                            <button onClick={() => updateCloud({module: 'excel', currentQ: 0, showAnswers: false})} className={`px-8 py-3 rounded-2xl font-black transition-all ${session.module === 'excel' ? 'bg-green-600 text-white shadow-lg' : 'text-slate-400'}`}>EXCEL</button>
                            <button onClick={() => updateCloud({module: 'google', currentQ: 0, showAnswers: false})} className={`px-8 py-3 rounded-2xl font-black transition-all ${session.module === 'google' ? 'bg-amber-500 text-white shadow-lg' : 'text-slate-400'}`}>GOOGLE</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-6xl">
                            <button onClick={() => setView('teacher')} className="bg-white p-12 rounded-[3.5rem] shadow-xl border-b-[20px] border-blue-600 hover:-translate-y-2 transition-all font-black text-2xl group text-slate-800 text-center">
                                <span className="block text-6xl mb-4 group-hover:scale-110 transition-transform">📊</span>
                                DASHBOARD
                            </button>
                            <button onClick={() => setView('scanner')} className="bg-white p-12 rounded-[3.5rem] shadow-xl border-b-[20px] border-green-500 hover:-translate-y-2 transition-all font-black text-2xl group text-slate-800 text-center">
                                <span className="block text-6xl mb-4 group-hover:scale-110 transition-transform">📸</span>
                                SCANNER
                            </button>
                            <button onClick={() => setView('print')} className="bg-white p-12 rounded-[3.5rem] shadow-xl border-b-[20px] border-purple-500 hover:-translate-y-2 transition-all font-black text-2xl group text-slate-800 text-center">
                                <span className="block text-6xl mb-4 group-hover:scale-110 transition-transform">🖨️</span>
                                CARTES QR
                            </button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'teacher') {
                const qList = QUESTIONS[session.module];
                const q = qList[session.currentQ];
                return (
                    <div className="min-h-screen flex flex-col bg-slate-50 font-sans text-slate-900">
                        <header className="bg-white p-4 flex justify-between items-center border-b sticky top-0 z-20 shadow-sm">
                            <button onClick={() => setView('menu')} className="font-black text-slate-400 uppercase text-xs">← Menu</button>
                            <div className="font-black uppercase tracking-widest text-slate-800">LIVE SESSION : {session.module}</div>
                            <button onClick={resetVotes} className="bg-red-50 text-red-500 px-4 py-1 rounded-xl font-bold text-xs uppercase">Reset</button>
                        </header>

                        <div className="p-6 bg-white border-b flex flex-col md:flex-row justify-between items-center gap-6 shadow-md">
                            <div className="flex items-center gap-4">
                                <button onClick={() => updateCloud({currentQ: Math.max(0, session.currentQ - 1), showAnswers: false})} className="p-4 bg-zinc-100 rounded-2xl border font-bold text-xl active:bg-zinc-200">◀</button>
                                <div className="text-center bg-zinc-50 px-8 py-2 rounded-2xl border min-w-[150px]">
                                    <span className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest">Question</span>
                                    <span className="text-4xl font-black text-slate-900">{session.currentQ + 1} / {qList.length}</span>
                                </div>
                                <button onClick={() => updateCloud({currentQ: Math.min(qList.length-1, session.currentQ + 1), showAnswers: false})} className="p-4 bg-zinc-100 rounded-2xl border font-bold text-xl active:bg-zinc-200">▶</button>
                            </div>
                            <button onClick={() => updateCloud({showAnswers: !session.showAnswers})} className={`px-16 py-5 rounded-full font-black text-2xl shadow-2xl transition-all active:scale-95 ${session.showAnswers ? 'bg-zinc-800 text-white' : 'bg-amber-500 text-white shadow-amber-200 animate-pulse'}`}>
                                {session.showAnswers ? "MASQUER RÉPONSE" : "VOIR LA RÉPONSE"}
                            </button>
                        </div>

                        <div className="flex-1 p-6 grid grid-cols-1 lg:grid-cols-4 gap-8 overflow-hidden">
                            <div className="lg:col-span-3 space-y-6 overflow-y-auto pb-20 pr-2">
                                <div className="bg-white p-12 rounded-[3.5rem] shadow-xl border-b-[16px] border-zinc-200 text-center">
                                    <h3 className="text-3xl md:text-5xl font-black text-zinc-900 leading-tight">{q.q}</h3>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
                                    {q.a.map((ans, i) => (
                                        <div key={i} className={`p-8 rounded-[2.5rem] border-4 flex items-center gap-8 transition-all duration-700 ${session.showAnswers && i === q.c ? 'bg-green-100 border-green-500 text-green-800 scale-[1.03] shadow-xl shadow-green-100' : 'bg-white border-transparent shadow-sm'}`}>
                                            <span className={`w-16 h-16 md:w-20 md:h-20 rounded-[1.5rem] flex items-center justify-center text-4xl font-black shadow-inner ${session.showAnswers && i === q.c ? 'bg-green-600 text-white animate-bounce' : 'bg-slate-900 text-white'}`}>{"ABCD"[i]}</span>
                                            <span className="text-2xl md:text-3xl font-black leading-tight text-slate-900">{ans}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-white rounded-[3rem] shadow-2xl p-6 flex flex-col border-t-[12px] border-zinc-100 overflow-hidden">
                                <h4 className="text-2xl font-black text-zinc-900 mb-6 uppercase tracking-tighter italic">VOTES ({Object.keys(responses).length})</h4>
                                <div className="grid grid-cols-2 gap-3 overflow-y-auto pr-1 pb-6">
                                    {STUDENTS.map(s => {
                                        const res = responses[s.id];
                                        const color = res ? (session.showAnswers ? (res.answerIdx === q.c ? 'bg-green-500 text-white shadow-md border-green-600' : 'bg-red-400 text-white shadow-md border-red-500') : 'bg-blue-600 text-white animate-pulse shadow-lg shadow-blue-100') : 'bg-slate-50 border-slate-100 text-slate-300';
                                        return (
                                            <div key={s.id} className={`p-4 rounded-3xl border-2 flex flex-col items-center justify-center transition-all duration-500 ${color}`}>
                                                <div className="flex items-center gap-1 mb-1">
                                                    <span className="text-[8px] font-black opacity-50 text-inherit">#{s.id}</span>
                                                    {res && <span className="px-2 py-0.5 rounded-lg font-black text-[10px] bg-white/20 text-inherit">{"ABCD"[res.answerIdx]}</span>}
                                                </div>
                                                <span className="font-black text-[10px] uppercase truncate w-full text-center leading-none text-inherit">{s.name.split(' ')[1]}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'scanner') return <ScannerView submitVote={submitVote} setView={setView} />;

            if (view === 'print') return (
                <div className="bg-white min-h-screen p-8 font-sans text-slate-900">
                    <button onClick={() => setView('menu')} className="no-print mb-10 bg-black text-white px-10 py-4 rounded-2xl font-black shadow-xl uppercase transition-all active:scale-95">← Retour au menu</button>
                    <div className="max-w-[21cm] mx-auto space-y-12">
                        {STUDENTS.map(s => (
                            <div key={s.id} className="grid grid-cols-2 gap-6 page-break py-4">
                                {["A", "B", "C", "D"].map(L => (
                                    <div key={L} className="border-[10px] border-black rounded-[4rem] p-10 flex flex-col items-center justify-between h-[13.5cm] bg-white relative">
                                        <div className="text-9xl font-black leading-none text-black">{L}</div>
                                        <LocalQR text={`${s.id}-${L}`} />
                                        <div className="text-center w-full border-t-4 border-black pt-6">
                                            <div className="font-black text-3xl uppercase tracking-tighter text-black">{s.name}</div>
                                            <div className="text-sm font-bold text-slate-400 uppercase tracking-[0.2em] mt-2 italic">MASTER EVALUATION 1APIC</div>
                                        </div>
                                        <div className="absolute top-8 right-8 font-black opacity-5 text-8xl select-none text-black">{L}</div>
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
